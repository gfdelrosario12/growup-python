# Mosquitto MQTT Broker Configuration

# Default listener
listener 1883
protocol mqtt

# WebSocket listener
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_dest topic
log_type all
log_timestamp true

# Security (for development only, no auth required)
allow_anonymous true
